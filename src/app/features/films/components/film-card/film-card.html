<div class="film-card">
  <img [src]="film().posterUrl" [alt]="film().title" />

  <h2>{{ film().title }}</h2>
  <p>{{ film().year }}</p>
  <p>{{ film().genre }}</p>
  <p>{{ film().rating }}</p>
  <p>{{ duration() }}</p>

  <button (click)="onToggleFavorite()">
    {{ film().isFavorite ? '★' : '☆' }}
  </button>
</div>
