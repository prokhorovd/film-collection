@if (film(); as film) {
  <article class="movie-details">
    <div class="movie-poster-wrap">
      <img class="movie-poster" [src]="film.posterUrl" [alt]="film.title" />
    </div>

    <div class="movie-info">
      <div class="movie-tags">
        <span class="movie-genre-tag">{{ film.genre }}</span>
        <span class="movie-year">{{ film.year }}</span>
      </div>

      <h1 class="movie-title">{{ film.title }}</h1>

      <div class="movie-stats">
        <div class="movie-stat">
          <span class="movie-stat-label">Rating</span>
          <span class="movie-stat-rating">★ {{ film.rating }}</span>
        </div>
        <div class="movie-stat">
          <span class="movie-stat-label">Duration</span>
          <span class="movie-stat-value">{{ film.duration | duration }}</span>
        </div>
      </div>

      <p class="movie-description">{{ film.description }}</p>

      <a class="movie-back" routerLink="/">← Back to catalog</a>
    </div>
  </article>
} @else {
  <div class="movie-not-found">
    <p>Film not found</p>
    <a routerLink="/">← Back to catalog</a>
  </div>
}
